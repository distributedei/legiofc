const msal_ = new msal.PublicClientApplication({
  auth:{ clientId:CLIENT_ID, authority:`https://login.microsoftonline.com/${TENANT_ID}`, redirectUri:window.location.href.split('?')[0] },
  cache:{ cacheLocation:'sessionStorage' }
});
const req = { scopes:['Sites.ReadWrite.All','User.Read'] };

let siteId, listId;

async function init(){ await msal_.initialize(); if(msal_.getAllAccounts().length) showUser(msal_.getAllAccounts()[0]); }
async function signIn(){
  await msal_.initialize();
  const r = await msal_.loginPopup(req);
  showUser(r.account);
}
function showUser(a){
  const name = a.name||a.username;
  document.getElementById('av').textContent = name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('uname').textContent = name;
  document.getElementById('user-row').style.display='flex';
  document.getElementById('signin-btn').style.display='none';
  document.getElementById('delete-btn').disabled=false;
  document.getElementById('upload-btn').disabled=false;
  setStatus('Ready');
}
async function getToken(){ const r=await msal_.acquireTokenSilent({...req,account:msal_.getAllAccounts()[0]}); return r.accessToken; }
async function getIds(){
  if(siteId) return;
  const t=await getToken(); const h={Authorization:`Bearer ${t}`};
  const s=await(await fetch('https://graph.microsoft.com/v1.0/sites/legiofc.sharepoint.com',{headers:h})).json();
  siteId=s.id;
  const l=await(await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists?$filter=displayName eq 'IDCampRoster'&$select=id`,{headers:h})).json();
  listId=l.value[0].id;
}

async function deleteAll(){
  document.getElementById('delete-btn').disabled=true;
  setStatus('Fetching existing items...');
  const t=await getToken(); const h={Authorization:`Bearer ${t}`,'Content-Type':'application/json'};
  await getIds();
  
  let url=`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items?$select=id&$top=999`;
  let ids=[];
  while(url){
    const r=await(await fetch(url,{headers:h})).json();
    ids=ids.concat(r.value.map(i=>i.id));
    url=r['@odata.nextLink']||null;
  }
  
  addLog(`Deleting ${ids.length} existing records...`, 'info');
  let deleted=0;
  for(const id of ids){
    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items/${id}`,{method:'DELETE',headers:h});
    deleted++;
    setStatus(`Deleting ${deleted} of ${ids.length}...`);
    document.getElementById('pbar').style.width=(deleted/ids.length*100)+'%';
    await new Promise(r=>setTimeout(r,150));
  }
  addLog(`✓ Deleted ${deleted} records`, 'ok');
  setStatus('Delete complete — ready to upload');
  document.getElementById('pbar').style.width='0%';
}

async function uploadAll(){
  document.getElementById('upload-btn').disabled=true;
  const t=await getToken(); const h={Authorization:`Bearer ${t}`,'Content-Type':'application/json'};
  await getIds();
  
  let done=0, errors=0;
  for(let i=0;i<RECORDS.length;i++){
    const p=RECORDS[i];
    try{
      const res=await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items`,{
        method:'POST',headers:h,
        body:JSON.stringify({fields:{
          Title:p.FullName, LastName:p.LastName, BirthDate:p.BirthDate,
          Gender:p.Gender, Email:p.Email, CurrentLocation:p.CurrentLocation,
          IDCampLocation:p.IDCampLocation, CurrentTeam:p.CurrentTeam,
          PastExperience:p.PastExperience, CanTravel:p.CanTravel
        }})
      });
      if(res.ok){ done++; document.getElementById('s-done').textContent=done; addLog(`✓ ${p.FullName} → ${p.Email}`, 'ok'); }
      else{ const d=await res.json(); errors++; document.getElementById('s-err').textContent=errors; addLog(`✗ ${p.FullName}: ${d.error?.message}`, 'err'); }
    }catch(e){ errors++; document.getElementById('s-err').textContent=errors; addLog(`✗ ${p.FullName}: ${e.message}`, 'err'); }
    document.getElementById('pbar').style.width=((i+1)/RECORDS.length*100)+'%';
    setStatus(`Uploading ${i+1} of ${RECORDS.length}...`);
    await new Promise(r=>setTimeout(r,200));
  }
  setStatus(`Complete — ${done} uploaded, ${errors} errors`);
}

function setStatus(m){ document.getElementById('status').textContent=m; }
function addLog(m,c){ const d=document.createElement('div'); d.className=c; d.textContent=m; const l=document.getElementById('log'); l.appendChild(d); l.scrollTop=l.scrollHeight; }
init();
</script>

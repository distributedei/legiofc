<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legio Football Club | Est. 2025</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--blue:#1c5575;--blue-dark:#163d54;--crimson:#9c1829;--gold:#dab751;--gold-bright:#e3ba24;--cream:#f8f6f1}
        body{font-family:'Inter',sans-serif;background:var(--blue);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;position:relative;overflow-x:hidden}
        .ribbon-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden}
        .ribbon-bg svg{position:absolute;width:150%;height:150%;top:-25%;left:-25%;opacity:0.15}
        .container{max-width:900px;width:100%;text-align:center;position:relative;z-index:1}
        .logo{width:500px;height:500px;margin:0 auto 20px;animation:fadeIn 1s ease-out}
        .logo img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 15px 40px rgba(0,0,0,0.4))}
        .motto-english{font-family:'Cinzel',serif;font-size:11px;font-weight:400;letter-spacing:3px;color:rgba(248,246,241,0.7);text-transform:uppercase;margin-bottom:8px;animation:fadeIn 1s ease-out 0.2s backwards}
        .founded{font-family:'Cinzel',serif;font-size:16px;font-weight:600;letter-spacing:8px;color:var(--gold);opacity:0.8;margin-bottom:50px;animation:fadeIn 1s ease-out 0.3s backwards}
        .section-label{font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:30px;animation:fadeIn 1s ease-out 0.4s backwards}
        .camps-grid{display:flex;gap:50px;justify-content:center;align-items:flex-end;margin-bottom:35px;animation:fadeIn 1s ease-out 0.5s backwards}
        .camp-column{display:flex;flex-direction:column;align-items:center}
        .camp-logo-link{display:flex;align-items:center;justify-content:center;height:90px;margin-bottom:15px;transition:transform 0.3s ease,opacity 0.3s ease}
        .camp-logo-link:hover{transform:scale(1.05);opacity:0.9}
        .camp-logo{height:100%;width:auto;object-fit:contain}
        .tst-logo{filter:invert(1) brightness(2);height:75px}
        .cary-logo{height:90px}
        .camp-title{font-family:'Cinzel',serif;font-size:14px;font-weight:600;letter-spacing:2px;color:#fff;text-transform:uppercase;height:90px;display:flex;align-items:center;justify-content:center;margin-bottom:15px;text-decoration:none;transition:transform 0.3s ease,opacity 0.3s ease}
        .camp-title:hover{transform:scale(1.05);opacity:0.9}
        .btn-camp{display:flex;align-items:center;justify-content:center;gap:12px;padding:12px 35px;font-family:'Cinzel',serif;font-size:12px;font-weight:500;letter-spacing:2px;text-decoration:none;text-transform:uppercase;transition:all 0.3s ease;cursor:pointer;border:1px solid var(--gold);background:transparent;color:var(--gold)}
        .btn-camp:hover{background:var(--gold);color:var(--blue-dark)}
        .divider-line{width:60px;height:1px;background:var(--gold);margin:0 auto 35px;opacity:0.4;animation:fadeIn 1s ease-out 0.6s backwards}
        .supporters-section{text-align:center;margin-bottom:35px;animation:fadeIn 1s ease-out 0.65s backwards}
        .supporters-section .section-label{margin-bottom:10px}
        .supporters-text{font-family:'Inter',sans-serif;font-size:14px;font-weight:300;color:rgba(248,246,241,0.7);margin-bottom:15px}
        .btn-youtube{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;text-decoration:none;background:#FF0000;color:#fff;border-radius:4px;transition:all 0.3s ease;margin-bottom:25px}
        .btn-youtube:hover{background:#cc0000;transform:scale(1.05)}
        .btn-youtube svg{width:20px;height:20px}
        .videos-grid{display:flex;gap:15px;justify-content:center;margin-bottom:15px;flex-wrap:wrap}
        .video-container{position:relative;width:280px;aspect-ratio:16/9;border:1px solid var(--gold);border-radius:4px;overflow:hidden}
        .video-container iframe{position:absolute;top:0;left:0;width:100%;height:100%}
        .channel-links{display:flex;gap:20px;justify-content:center;margin-bottom:25px;flex-wrap:wrap}
        .channel-link{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;font-family:'Inter',sans-serif;font-size:11px;font-weight:400;text-decoration:none;color:rgba(248,246,241,0.7);border:1px solid rgba(248,246,241,0.3);border-radius:4px;transition:all 0.3s ease}
        .channel-link:hover{background:rgba(255,255,255,0.1);color:var(--cream);border-color:var(--gold)}
        .channel-link svg{width:16px;height:16px;fill:#FF0000}
        .btn-supporters{display:inline-flex;align-items:center;gap:10px;padding:12px 35px;font-family:'Cinzel',serif;font-size:12px;font-weight:500;letter-spacing:2px;text-decoration:none;text-transform:uppercase;transition:all 0.3s ease;cursor:pointer;border:1px solid var(--gold);background:transparent;color:var(--gold)}
        .btn-supporters:hover{background:var(--gold);color:var(--blue-dark)}
        .instagram-icon{width:18px;height:18px}
        .contact-link{font-family:'Inter',sans-serif;font-size:12px;font-weight:400;letter-spacing:2px;color:rgba(248,246,241,0.5);text-decoration:none;text-transform:uppercase;transition:color 0.3s ease;animation:fadeIn 1s ease-out 0.7s backwards}
        .contact-link:hover{color:var(--cream)}
        .staff-link{display:inline-block;margin-top:20px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:rgba(218,183,81,0.4);text-decoration:none;text-transform:uppercase;transition:color 0.3s ease}
        .staff-link:hover{color:var(--gold)}
        footer{margin-top:60px;animation:fadeIn 1s ease-out 0.8s backwards}
        footer p{font-family:'Inter',sans-serif;color:rgba(248,246,241,0.25);font-size:11px;letter-spacing:1px}
        @keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:480px){body{padding:40px 10px;justify-content:flex-start;padding-top:20px}.container{max-width:320px;width:100%}.logo{width:280px;height:280px;margin:0 auto 15px}.motto-english{font-size:9px;letter-spacing:3px}.founded{font-size:12px;letter-spacing:6px;margin-bottom:35px}.section-label{font-size:9px;letter-spacing:3px;margin-bottom:20px}.camps-grid{gap:20px;flex-wrap:wrap}.camp-column{min-width:95px}.camp-logo-link{height:50px;margin-bottom:10px}.tst-logo{height:40px}.cary-logo{height:50px}.camp-title{height:50px;font-size:9px;margin-bottom:10px}.btn-camp{padding:10px 20px;font-size:10px;letter-spacing:1.5px}.supporters-text{font-size:12px}.btn-supporters{padding:10px 25px;font-size:10px}.instagram-icon{width:16px;height:16px}.contact-link{font-size:10px}footer p{font-size:10px}.videos-grid{flex-direction:column;align-items:center}.video-container{width:100%;max-width:300px}.channel-links{flex-direction:column;align-items:center;gap:10px}}
    </style>
</head>

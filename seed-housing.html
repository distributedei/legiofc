async function seed() {
  const log = document.getElementById('log');
  log.textContent = 'Seeding 10 housing records...\n\n';

  // First delete the existing test housing
  try {
    const existing = await (await fetch(API+'/housing?tournamentId='+TID)).json();
    for (const h of existing) {
      await fetch(API+'/housing?id='+h.id+'&tournamentId='+TID, {method:'DELETE'});
      log.textContent += '✗ Deleted old: ' + h.name + '\n';
    }
  } catch(e) { log.textContent += 'No existing records to clean\n'; }

  log.textContent += '\n';

  for (const h of houses) {
    h.createdAt = new Date().toISOString();
    h.updatedAt = new Date().toISOString();
    try {
      const res = await fetch(API+'/housing', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(h)
      });
      const data = await res.json();
      log.textContent += '✓ ' + h.team + ' — ' + h.name + ' (' + h.beds.length + ' beds)\n';
    } catch(e) {
      log.textContent += '✗ FAILED: ' + h.name + ' — ' + e.message + '\n';
    }
  }
  log.textContent += '\n═══════════════════════════\nDone! Go to tournament.html and check the Housing tab.\n';
}

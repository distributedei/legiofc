<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legio FC | Live Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@azure/msal-browser@3.28.0/lib/msal-browser.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--blue:#1c5575;--blue-dark:#163d54;--gold:#dab751;--gold-border:rgba(218,183,81,0.3);--cream:#f8f6f1;--text-dim:rgba(248,246,241,0.5);--text-faint:rgba(248,246,241,0.22);--green:#4caf50;--red:#e57373}
    body{font-family:'Inter',sans-serif;background:var(--blue-dark);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px}
    .card{background:rgba(22,61,84,.6);border:1px solid var(--gold-border);padding:36px 40px;width:100%;max-width:560px;margin-bottom:20px;position:relative}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
    h1{font-family:'Cinzel',serif;font-size:16px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
    .sub{font-size:12px;color:var(--text-dim);margin-bottom:28px;line-height:1.6}

    /* PIN screen */
    #pin-screen{text-align:center}
    .pin-input{width:160px;padding:14px;text-align:center;font-family:'Cinzel',serif;font-size:24px;letter-spacing:8px;background:rgba(248,246,241,.05);border:1px solid var(--gold-border);color:var(--cream);outline:none;transition:border-color .2s}
    .pin-input:focus{border-color:var(--gold)}
    .pin-btn{margin-top:14px;padding:12px 36px;background:var(--gold);color:var(--blue-dark);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;width:160px;transition:background .2s}
    .pin-btn:hover{background:#c9a643}
    .pin-err{color:var(--red);font-size:11px;margin-top:8px;min-height:16px}

    /* Control panel */
    #control-screen{display:none}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:18px}
    .field label{font-size:8px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint)}
    .field input,.field select{padding:10px 12px;background:rgba(248,246,241,.05);border:1px solid var(--gold-border);color:var(--cream);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%}
    .field input:focus,.field select:focus{border-color:var(--gold)}
    .field select option{background:var(--blue-dark)}
    .score-row{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;margin-bottom:18px}
    .score-input{padding:14px;text-align:center;font-family:'Cinzel',serif;font-size:32px;font-weight:700;background:rgba(248,246,241,.05);border:1px solid var(--gold-border);color:var(--cream);outline:none;transition:border-color .2s}
    .score-input:focus{border-color:var(--gold)}
    .score-vs{font-family:'Cinzel',serif;font-size:14px;letter-spacing:3px;color:var(--text-faint);text-align:center}
    .score-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--text-faint);text-align:center;margin-bottom:4px}

    .go-live-btn{width:100%;padding:16px;background:var(--green);color:#fff;font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
    .go-live-btn:hover{background:#43a047}
    .go-live-btn:disabled{opacity:.5;cursor:not-allowed}
    .end-btn{width:100%;padding:12px;background:transparent;color:var(--red);font-family:'Cinzel',serif;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(229,115,115,.4);cursor:pointer;transition:all .2s}
    .end-btn:hover{background:rgba(229,115,115,.1)}
    .end-btn:disabled{opacity:.5;cursor:not-allowed}
    .update-btn{width:100%;padding:12px;background:var(--gold);color:var(--blue-dark);font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:none;cursor:pointer;transition:background .2s;margin-bottom:10px}
    .update-btn:hover{background:#c9a643}
    .update-btn:disabled{opacity:.5;cursor:not-allowed}

    .live-indicator{display:none;align-items:center;gap:8px;padding:10px 16px;background:rgba(76,175,80,.1);border:1px solid rgba(76,175,80,.4);margin-bottom:18px}
    .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:lpulse 1s ease-in-out infinite;flex-shrink:0}
    @keyframes lpulse{0%,100%{opacity:1}50%{opacity:.3}}
    .live-txt{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--green);text-transform:uppercase}

    .status-msg{font-size:11px;color:var(--text-dim);text-align:center;min-height:16px;margin-top:8px}
    .ms-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%;margin-bottom:10px}
    .ms-btn:hover{background:var(--gold);color:var(--blue-dark)}
    .divider{height:1px;background:var(--gold-border);margin:20px 0}
    .back-link{display:block;text-align:center;font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-faint);text-decoration:none;text-transform:uppercase;margin-top:16px;transition:color .2s}
    .back-link:hover{color:var(--gold)}
  </style>
</head>
<body>

<div class="card">
  <h1>Live Match Control</h1>
  <p class="sub">Control the live match banner on legiofc.com. Enter your PIN to access.</p>

  <!-- PIN Screen -->
  <div id="pin-screen">
    <input class="pin-input" type="password" id="pin-input" maxlength="6" placeholder="••••••" onkeydown="if(event.key==='Enter')checkPin()">
    <br>
    <button class="pin-btn" onclick="checkPin()">Enter</button>
    <div class="pin-err" id="pin-err"></div>
    <div class="divider"></div>
    <p style="font-size:11px;color:var(--text-faint);margin-bottom:14px;">Or sign in with Microsoft for full access:</p>
    <button class="ms-btn" id="ms-btn" onclick="msSignIn()">
      <svg width="16" height="16" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Sign In with Microsoft
    </button>
  </div>

  <!-- Control Panel -->
  <div id="control-screen">
    <div class="live-indicator" id="live-indicator">
      <div class="live-dot"></div>
      <span class="live-txt">Match is Live — legiofc.com is showing the banner</span>
    </div>

    <div class="field">
      <label>Match (select existing or type below)</label>
      <select id="match-select" onchange="populateFromMatch()">
        <option value="">— Select existing match —</option>
      </select>
    </div>

    <div class="field">
      <label>Home Team</label>
      <input type="text" id="home" placeholder="e.g. Legio FC">
    </div>
    <div class="field">
      <label>Away Team (Opponent)</label>
      <input type="text" id="opponent" placeholder="e.g. Chivas Alabama">
    </div>

    <div class="field">
      <label>Tournament</label>
      <input type="text" id="tournament" placeholder="e.g. TST 2026">
    </div>

    <div class="score-label" style="display:grid;grid-template-columns:1fr auto 1fr;gap:12px;margin-bottom:4px;">
      <div style="text-align:center;" id="home-label">Legio FC</div>
      <div></div>
      <div id="opp-label" style="text-align:center;">Opponent</div>
    </div>
    <div class="score-row">
      <input class="score-input" type="number" id="legio-score" value="0" min="0">
      <div class="score-vs">–</div>
      <input class="score-input" type="number" id="opp-score" value="0" min="0">
    </div>

    <div class="field">
      <label>YouTube Live Stream URL</label>
      <input type="url" id="yt-url" placeholder="https://youtube.com/watch?v=...">
    </div>

    <div class="field">
      <label>Notes (optional — e.g. Extra Time)</label>
      <input type="text" id="notes" placeholder="Optional">
    </div>

    <button class="go-live-btn" id="go-live-btn" onclick="goLive()">
      <span style="width:8px;height:8px;border-radius:50%;background:#fff;display:inline-block;animation:lpulse 1s ease-in-out infinite;"></span>
      Go Live
    </button>
    <button class="update-btn" id="update-btn" onclick="updateScore()" style="display:none;">↻ Update Score</button>
    <button class="end-btn" id="end-btn" onclick="endMatch()" style="display:none;">End Match</button>
    <div class="status-msg" id="status-msg"></div>
  </div>
</div>

<a href="index.html" class="back-link">← Back to legiofc.com</a>

<script>
const PIN = '1869'; // Change this to your desired PIN
const CLIENT_ID = 'b1c58e0f-4e20-40e8-be74-5c231a030a90';
const TENANT_ID = '99b5fc0c-be85-4531-a7de-bc8da0002ec2';
const SITE_HOST = 'legiofc.sharepoint.com';

const msalConfig = {
  auth:{clientId:CLIENT_ID,authority:`https://login.microsoftonline.com/${TENANT_ID}`,redirectUri:window.location.href.split('?')[0].split('#')[0]},
  cache:{cacheLocation:'sessionStorage'}
};
const loginReq = {scopes:['Sites.ReadWrite.All']};
const msal_ = new msal.PublicClientApplication(msalConfig);

let siteId=null, matchListId=null, liveMatchId=null, token=null;

async function init() {
  await msal_.initialize();
  const accts = msal_.getAllAccounts();
  if (accts.length) { await getTokenSilent(); showControl(); }
}

async function getTokenSilent() {
  const r = await msal_.acquireTokenSilent({...loginReq, account: msal_.getAllAccounts()[0]});
  token = r.accessToken;
}

async function msSignIn() {
  document.getElementById('ms-btn').textContent = 'Signing in…';
  try {
    const r = await msal_.loginPopup(loginReq);
    token = r.accessToken;
    showControl();
  } catch(e) {
    document.getElementById('ms-btn').textContent = 'Sign In with Microsoft';
  }
}

function checkPin() {
  const val = document.getElementById('pin-input').value;
  if (val === PIN) {
    // PIN mode — needs Microsoft sign-in for Graph API
    document.getElementById('pin-err').textContent = '';
    document.getElementById('pin-screen').innerHTML = `
      <p style="font-size:13px;color:rgba(248,246,241,0.6);margin-bottom:16px;">PIN verified. Sign in with Microsoft to connect to SharePoint:</p>
      <button class="ms-btn" onclick="msSignIn()">
        <svg width="16" height="16" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
        Connect to SharePoint
      </button>`;
  } else {
    document.getElementById('pin-err').textContent = 'Incorrect PIN';
    document.getElementById('pin-input').value = '';
  }
}

async function getSiteAndList() {
  if (siteId) return;
  const h = {Authorization:`Bearer ${token}`};
  const s = await (await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_HOST}`, {headers:h})).json();
  siteId = s.id;
  const ls = await (await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists?$select=id,displayName`, {headers:h})).json();
  for (const l of ls.value) if (l.displayName === 'LegioMatches') matchListId = l.id;
}

async function showControl() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('control-screen').style.display = 'block';
  setStatus('Connected — loading matches…');
  await loadMatchesForSelect();
  await checkCurrentLive();
}

async function loadMatchesForSelect() {
  try {
    await getSiteAndList();
    const h = {Authorization:`Bearer ${token}`};
    const res = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${matchListId}/items?$expand=fields($select=Title,Opponent,HomeTeam,Tournament,LegioScore,OpponentScore,YouTubeURL,Notes,Status,IsLive)&$top=50`, {headers:h});
    const data = await res.json();
    const sel = document.getElementById('match-select');
    sel.innerHTML = '<option value="">— Select existing match —</option>';
    for (const item of data.value) {
      const f = item.fields;
      const opt = document.createElement('option');
      opt.value = item.id;
      opt.textContent = `${f.Title||'Untitled'} (${f.Status||'Upcoming'})`;
      opt.dataset.opponent = f.Opponent||'';opt.dataset.home = f.HomeTeam||'';
      opt.dataset.tournament = f.Tournament||'';
      opt.dataset.legio = f.LegioScore!=null?f.LegioScore:0;
      opt.dataset.opp = f.OpponentScore!=null?f.OpponentScore:0;
      opt.dataset.yt = f.YouTubeURL||'';
      opt.dataset.notes = f.Notes||'';
      opt.dataset.islive = f.IsLive?'1':'0';
      sel.appendChild(opt);
    }
    setStatus('Ready');
  } catch(e) { setStatus('Error loading matches: ' + e.message); }
}

function populateFromMatch() {
  const sel = document.getElementById('match-select');
  const opt = sel.options[sel.selectedIndex];
  if (!opt.value) return;
  document.getElementById('home').value = opt.dataset.home;document.getElementById('opponent').value = opt.dataset.opponent;
  document.getElementById('tournament').value = opt.dataset.tournament;
  document.getElementById('legio-score').value = opt.dataset.legio;
  document.getElementById('opp-score').value = opt.dataset.opp;
  document.getElementById('yt-url').value = opt.dataset.yt;
  document.getElementById('notes').value = opt.dataset.notes;
  document.getElementById('opp-label').textContent = opt.dataset.opponent || 'Opponent';
  liveMatchId = opt.value;
}

async function checkCurrentLive() {
  try {
    await getSiteAndList();
    const h = {Authorization:`Bearer ${token}`};
    const res = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${matchListId}/items?$expand=fields($select=Title,Opponent,LegioScore,OpponentScore,IsLive,Status)&$filter=fields/IsLive eq 1&$top=1`, {headers:h});
    const data = await res.json();
    if (data.value && data.value.length > 0) {
      const m = data.value[0];
      liveMatchId = m.id;
      showLiveState(true);
      // Pre-populate the select
      document.getElementById('match-select').value = m.id;
      populateFromMatch();
    }
  } catch(e) {}
}

function showLiveState(isLive) {
  document.getElementById('live-indicator').style.display = isLive ? 'flex' : 'none';
  document.getElementById('go-live-btn').style.display = isLive ? 'none' : 'flex';
  document.getElementById('update-btn').style.display = isLive ? 'block' : 'none';
  document.getElementById('end-btn').style.display = isLive ? 'block' : 'none';
}

async function goLive() {
  const btn = document.getElementById('go-live-btn');
  btn.disabled = true; setStatus('Going live…');
  try {
    await getSiteAndList();
    const h = {Authorization:`Bearer ${token}`,'Content-Type':'application/json'};
    const fields = buildFields(true);
    if (liveMatchId) {
      await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${matchListId}/items/${liveMatchId}/fields`, {method:'PATCH',headers:h,body:JSON.stringify(fields)});
    } else {
      const title = `Legio FC vs ${document.getElementById('opponent').value}`;
      fields.Title = title;
      const res = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${matchListId}/items`, {method:'POST',headers:h,body:JSON.stringify({fields})});
      const data = await res.json();
      liveMatchId = data.id;
    }
    showLiveState(true);
    setStatus('✓ Live! legiofc.com is now showing the banner.');
    await loadMatchesForSelect();
  } catch(e) { setStatus('Error: ' + e.message); btn.disabled = false; }
}

async function updateScore() {
  const btn = document.getElementById('update-btn');
  btn.disabled = true; setStatus('Updating score…');
  try {
    await getSiteAndList();
    const h = {Authorization:`Bearer ${token}`,'Content-Type':'application/json'};
    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${matchListId}/items/${liveMatchId}/fields`, {method:'PATCH',headers:h,body:JSON.stringify(buildFields(true))});
    setStatus('✓ Score updated on legiofc.com');
  } catch(e) { setStatus('Error: ' + e.message); }
  btn.disabled = false;
}

async function endMatch() {
  if (!confirm('End the live match? The banner will be removed from legiofc.com.')) return;
  const btn = document.getElementById('end-btn');
  btn.disabled = true; setStatus('Ending match…');
  try {
    await getSiteAndList();
    const h = {Authorization:`Bearer ${token}`,'Content-Type':'application/json'};
    await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${matchListId}/items/${liveMatchId}/fields`, {method:'PATCH',headers:h,body:JSON.stringify({IsLive:false,Status:'Final'})});
    liveMatchId = null;
    showLiveState(false);
    setStatus('Match ended — banner removed from legiofc.com');
    await loadMatchesForSelect();
  } catch(e) { setStatus('Error: ' + e.message); btn.disabled = false; }
}

function buildFields(isLive) {
  return {
    HomeTeam: document.getElementById('home').value,Opponent: document.getElementById('opponent').value,
    Tournament: document.getElementById('tournament').value,
    LegioScore: parseInt(document.getElementById('legio-score').value)||0,
    OpponentScore: parseInt(document.getElementById('opp-score').value)||0,
    YouTubeURL: document.getElementById('yt-url').value,
    Notes: document.getElementById('notes').value,
    Status: 'Live',
    IsLive: isLive,
  };
}

document.getElementById('home').addEventListener('input', function() {
  document.getElementById('home-label').textContent = this.value || 'Home Team';
});
document.getElementById('opponent').addEventListener('input', function() {
  document.getElementById('opp-label').textContent = this.value || 'Opponent';
});

function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

init();
</script>
</body>
</html>

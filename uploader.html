    body{font-family:'Inter',sans-serif;background:var(--blue-dark);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:40px 20px}
    .card{background:rgba(22,61,84,.6);border:1px solid var(--gold-border);padding:36px 40px;width:100%;max-width:700px;margin-bottom:24px}
    h1{font-family:'Cinzel',serif;font-size:20px;letter-spacing:3px;color:var(--gold);margin-bottom:8px}
    .sub{font-size:13px;color:var(--text-dim);margin-bottom:28px;line-height:1.6}
    .ms-btn{display:inline-flex;align-items:center;gap:10px;padding:12px 28px;background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;width:100%;justify-content:center;margin-bottom:16px}
    .ms-btn:hover{background:var(--gold);color:var(--blue-dark)}
    .ms-btn:disabled{opacity:.4;cursor:not-allowed}
    .ms-icon{width:17px;height:17px}
    .upload-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 28px;background:var(--gold);color:var(--blue-dark);font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;width:100%;font-weight:600;transition:all .2s}
    .upload-btn:hover{background:#c9a643}
    .upload-btn:disabled{opacity:.4;cursor:not-allowed}
    .progress-wrap{background:rgba(0,0,0,.3);height:6px;border-radius:3px;margin:20px 0 12px;overflow:hidden;display:none}
    .progress-bar{height:100%;background:var(--gold);width:0%;transition:width .3s;border-radius:3px}
    .status{font-size:13px;color:var(--text-dim);text-align:center;min-height:20px;margin-bottom:16px}
    .log{background:rgba(0,0,0,.3);border:1px solid var(--gold-border);padding:16px;max-height:280px;overflow-y:auto;font-size:11px;font-family:'Courier New',monospace;color:var(--text-dim);display:none}
    .log .ok{color:#4caf50}
    .log .err{color:#e57373}
    .log .info{color:var(--gold)}
    .user-info{display:none;align-items:center;gap:10px;padding:10px 16px;background:rgba(218,183,81,.1);border:1px solid var(--gold-border);margin-bottom:20px;font-size:13px}
    .avatar{width:28px;height:28px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue-dark)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .stat{background:rgba(0,0,0,.2);border:1px solid var(--gold-border);padding:12px;text-align:center}
    .stat-val{font-family:'Cinzel',serif;font-size:24px;color:var(--gold)}
    .stat-label{font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-top:4px}
    .done-msg{display:none;text-align:center;padding:20px;color:#4caf50;font-family:'Cinzel',serif;letter-spacing:2px;font-size:13px}
  </style>
</head>

const msalConfig = {
  auth: {
    clientId: CLIENT_ID,
    authority: `https://login.microsoftonline.com/${TENANT_ID}`,
    redirectUri: window.location.href.split('?')[0],
  },
  cache: { cacheLocation: 'sessionStorage' }
};
const loginReq = { scopes: ['Sites.ReadWrite.All', 'User.Read'] };
const msal_ = new msal.PublicClientApplication(msalConfig);
async function init() {
  await msal_.initialize();
  const accts = msal_.getAllAccounts();
  if (accts.length) showUser(accts[0]);
}
async function signIn() {
  const btn = document.getElementById('signin-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await msal_.loginPopup(loginReq);
    showUser(r.account);
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = `<svg class="ms-icon" viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>Sign In with Microsoft`;
    setStatus('Sign-in failed: ' + e.message);
  }
}
function showUser(a) {
  const name = a.name || a.username;
  const ini = name.split(' ').filter(Boolean).map(n=>n[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('avatar').textContent = ini;
  document.getElementById('user-name').textContent = name;
  document.getElementById('user-info').style.display = 'flex';
  document.getElementById('signin-btn').style.display = 'none';
  document.getElementById('upload-btn').disabled = false;
  setStatus('Ready to upload 58 records');
}
async function getToken() {
  const accts = msal_.getAllAccounts();
  const r = await msal_.acquireTokenSilent({ ...loginReq, account: accts[0] });
  return r.accessToken;
}
async function startUpload() {
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = 'Uploading…';
  document.getElementById('progress-wrap').style.display = 'block';
  document.getElementById('log').style.display = 'block';
  const token = await getToken();
  const h = { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' };
  // Get site ID
  setStatus('Connecting to SharePoint…');
  const siteRes = await fetch(`https://graph.microsoft.com/v1.0/sites/${SITE_URL}`, {headers:h});
  const site = await siteRes.json();
  const siteId = site.id;
  // Get list ID
  const listRes = await fetch(`https://graph.microsoft.com/v1.0/sites/${siteId}/lists?$filter=displayName eq '${LIST_NAME}'&$select=id`, {headers:h});
  const listData = await listRes.json();
  const listId = listData.value[0].id;
  let done = 0, errors = 0;
  const total = RECORDS.length;
  for (let i = 0; i < total; i++) {
    const p = RECORDS[i];
    try {
      const body = {
        fields: {
          Title:           p.FullName,
          LastName:        p.LastName,
          BirthDate:       p.BirthDate,
          Gender:          p.Gender,
          Email:           p.Email,
          CurrentLocation: p.CurrentLocation,
          IDCampLocation:  p.IDCampLocation,
          CurrentTeam:     p.CurrentTeam,
          PastExperience:  p.PastExperience,
          CanTravel:       p.CanTravel,
        }
      };
      const res = await fetch(
        `https://graph.microsoft.com/v1.0/sites/${siteId}/lists/${listId}/items`,
        { method: 'POST', headers: h, body: JSON.stringify(body) }
      );
      if (res.ok) {
        done++;
        document.getElementById('s-done').textContent = done;
        addLog(`✓ ${p.FirstName} ${p.LastName}`, 'ok');
      } else {
        const err = await res.json();
        errors++;
        document.getElementById('s-err').textContent = errors;
        addLog(`✗ ${p.FirstName} ${p.LastName}: ${err.error?.message}`, 'err');
      }
    } catch(e) {
      errors++;
      document.getElementById('s-err').textContent = errors;
      addLog(`✗ ${p.FirstName} ${p.LastName}: ${e.message}`, 'err');
    }
    // Update progress
    const pct = Math.round((i+1)/total*100);
    document.getElementById('progress-bar').style.width = pct + '%';
    setStatus(`Uploading ${i+1} of ${total}…`);
    await new Promise(r => setTimeout(r, 200)); // small delay to avoid throttling
  }
  setStatus(`Complete — ${done} uploaded, ${errors} errors`);
  if (errors === 0) document.getElementById('done-msg').style.display = 'block';
  btn.textContent = '✓ Upload Complete';
}
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function addLog(msg, cls) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = cls; div.textContent = msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
init();

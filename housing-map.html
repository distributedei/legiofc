<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
html,body{margin:0;padding:0;height:100%;overflow:hidden}
#map{width:100%;height:100%}
</style>
</head>
<body>
<div id="map"></div>
<script>
const WAKEMED = [35.7884, -78.7539];

const properties = [
  // Leon Dallas Coed — exact from Google Places API
  { coords:[35.7569679, -78.7583755], name:'Cozy 4bd Home - BBQ', addr:'1308 Bloomingdale Dr, Cary, NC 27511', team:'Leon Dallas Coed', beds:5, color:'#dab751' },
  { coords:[35.762974, -78.804485], name:'Modern 4BR - Game Room & Firepit', addr:'1115 Brookgreen Dr, Cary, NC 27511', team:'Leon Dallas Coed', beds:7, color:'#dab751' },
  { coords:[35.757229, -78.822145], name:'Renovated 4BR - Cul-de-sac', addr:'116 McDole Cir, Cary, NC 27511', team:'Leon Dallas Coed', beds:5, color:'#dab751' },
  { coords:[35.776839, -78.719601], name:'Mulberry on Athens - 5BR', addr:'857 Athens Dr, Raleigh, NC 27606', team:'Leon Dallas Coed', beds:6, color:'#dab751' },
  { coords:[35.781543, -78.716389], name:'3BR Artful Design & Central', addr:'2117 Scarlet Maple Dr, Raleigh, NC 27606', team:'Leon Dallas Coed', beds:10, color:'#dab751' },
  // Mama Africa Men's — exact from Google Places API
  { coords:[35.751403, -78.687598], name:'Modern Home NCSU & Downtown', addr:'2909 Silver Maple Pl, Raleigh, NC 27603', team:"Mama Africa Men's", beds:6, color:'#2d7a3a' },
  { coords:[35.752201, -78.689225], name:'Mighty Mansion 3,300SF', addr:'1917 Deep Forest Trail, Raleigh, NC 27603', team:"Mama Africa Men's", beds:8, color:'#2d7a3a' },
  { coords:[35.751689, -78.688031], name:'The Maple Marvel', addr:'2908 Silver Maple Pl, Raleigh, NC 27603', team:"Mama Africa Men's", beds:7, color:'#2d7a3a' },
  { coords:[35.743482, -78.683042], name:'3BR Townhouse (Unit 1)', addr:'2606 Wolf Cub Ct, Raleigh, NC 27603', team:"Mama Africa Men's", beds:5, color:'#2d7a3a' },
  { coords:[35.743137, -78.682890], name:'3BR Townhouse (Unit 2)', addr:'2622 Wolf Cub Ct, Raleigh, NC 27603', team:"Mama Africa Men's", beds:5, color:'#2d7a3a' },
];

const map = L.map('map').setView([35.760, -78.740], 12);

L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
  subdomains:['mt0','mt1','mt2','mt3'], maxZoom:20, attribution:'© Google'
}).addTo(map);

// WakeMed marker
L.marker(WAKEMED, {
  icon: L.divIcon({
    className:'',
    html:'<div style="background:#dab751;color:#163d54;font-family:Arial,sans-serif;font-size:11px;font-weight:700;padding:5px 10px;border-radius:4px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.4)">⚽ WakeMed Soccer Park</div>',
    iconSize:[0,0], iconAnchor:[90,35]
  })
}).addTo(map).bindPopup('<b>WakeMed Soccer Park</b><br>101 Soccer Park Dr, Cary, NC 27511<br><a href="https://www.google.com/maps/search/WakeMed+Soccer+Park+101+Soccer+Park+Dr+Cary+NC" target="_blank">Open in Google Maps ↗</a>');

// RDU Airport
var RDU = [35.8772, -78.7934];
L.marker(RDU, {
  icon: L.divIcon({
    className:'',
    html:'<div style="background:#4a90d9;color:#fff;font-family:Arial,sans-serif;font-size:10px;font-weight:700;padding:4px 8px;border-radius:4px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.4)">✈ RDU Airport</div>',
    iconSize:[0,0], iconAnchor:[55,35]
  })
}).addTo(map).bindPopup('<b>RDU International Airport</b><br>2400 John Brantley Blvd, Morrisville, NC 27560<br><a href="https://www.google.com/maps/dir/RDU+Airport/101+Soccer+Park+Dr+Cary+NC+27511" target="_blank">Directions to WakeMed ↗</a>');

const allMarkers = [L.marker(WAKEMED), L.marker(RDU)];

properties.forEach(p => {
  const icon = L.divIcon({
    className:'',
    html:'<div style="width:30px;height:30px;background:'+p.color+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;font-size:12px;font-weight:700;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.4);cursor:pointer">'+p.beds+'</div>',
    iconSize:[30,30], iconAnchor:[15,15]
  });

  var mapsUrl = 'https://www.google.com/maps/search/' + encodeURIComponent(p.addr);
  var dirUrl = 'https://www.google.com/maps/dir/201+Soccer+Park+Dr+Cary+NC+27511/' + encodeURIComponent(p.addr);

  var marker = L.marker(p.coords, {icon:icon}).addTo(map);
  marker.bindPopup(
    '<div style="font-family:Arial,sans-serif;min-width:220px;line-height:1.5">' +
    '<div style="font-size:13px;font-weight:700;margin-bottom:3px">' + p.name + '</div>' +
    '<div style="font-size:11px;color:#666;margin-bottom:6px">' + p.addr + '</div>' +
    '<div style="font-size:11px;font-weight:600;color:' + p.color + ';margin-bottom:4px">' + p.team + '</div>' +
    '<div style="font-size:11px;margin-bottom:8px">' + p.beds + ' beds</div>' +
    '<a href="' + mapsUrl + '" target="_blank" style="font-size:11px;color:#1a73e8;text-decoration:none;margin-right:12px">📍 View on Maps</a>' +
    '<a href="' + dirUrl + '" target="_blank" style="font-size:11px;color:#1a73e8;text-decoration:none">🧭 Directions</a>' +
    '</div>'
  );
  allMarkers.push(marker);
});

map.fitBounds(L.featureGroup(allMarkers).getBounds().pad(0.08));
</script>
</body>
</html>
